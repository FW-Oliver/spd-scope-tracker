<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scope Tracker</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Scope Tracker</h1>

    <div id="summary">

        <div>
            🔴 OVERDUE:
            <span id="overdue-count">0</span>
        </div>

        <div>
            🟠 TODAY:
            <span id="today-count">0</span>
        </div>

        <div>
            🟡 WARNING:
            <span id="warning-count">0</span>
        </div>

        <div>
            🟢 GOOD:
            <span id="good-count">0</span>
        </div>

        <div>
            ⚪ OFF:
            <span id="off-count">0</span>
        </div>

        <div>
            🔵 NO EXPIRY:
            <span id="no-expiry-count">0</span>
        </div>

    </div>

    <hr>

    <h2>Cabinet 1</h2>

    <div
        class="cabinet"
        id="cabinet1">
    </div>

    <h2>Cabinet 2</h2>

    <div
        class="cabinet"
        id="cabinet2">
    </div>

    <h2>Cabinet 3</h2>

    <div
        class="cabinet"
        id="cabinet3">
    </div>

    <script src="script.js"></script>

</body>
</html>
